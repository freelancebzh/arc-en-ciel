<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Arc-en-Ciel Prestations</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-family: Arial, sans-serif;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .form-group textarea {
            resize: vertical;
            height: 120px;
        }
        .btn-submit {
            background-color: #2c3e50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #1a252f;
        }
        /* Style pour le Captcha de protection */
        .h-captcha {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
    <!-- Script requis pour le Captcha (hCaptcha) -->
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>

    <header>
        <div class="container">
            <h1>Arc-en-Ciel Services</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="espaces-verts.html">Espaces Verts</a></li>
                    <li><a href="services-menage.html">Ménage</a></li>
                    <li><a href="web-seo.html">Web & SEO</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        
        <div class="contact-container">
            <h2 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">Demande de devis ou renseignement</h2>
            
            <!-- Formulaire lié à Web3Forms -->
            <form action="https://api.web3forms.com/submit" method="POST">
                
                <!-- Clé d'accès à générer (voir instructions ci-dessous) -->
                <input type="hidden" name="access_key" value="5f69cbfc-d7bc-4039-9607-198dfc494e57">
                
                <!-- Redirection après envoi réussi -->
                <input type="hidden" name="redirect" value="https://www.arc-en-ciel-services.fr/merci.html">

                <!-- Protection anti-spam invisible (Honeypot) -->
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                <div class="form-group">
                    <label for="name">Nom / Prénom</label>
                    <input type="text" id="name" name="name" required placeholder="Votre nom complet">
                </div>

                <div class="form-group">
                    <label for="email">Adresse E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="@">
                </div>

                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone" placeholder="06 ...">
                </div>

                <div class="form-group">
                    <label for="service">Service concerné</label>
                    <select id="service" name="service" required>
                        <option value="" disabled selected>Choisissez un service</option>
                        <option value="menage">Ménage & Entretien intérieur</option>
                        <option value="jardin">Espaces Verts & Jardinage</option>
                        <option value="web-seo">Création Web & Référencement SEO</option>
                        <option value="autre">Autre demande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Votre message / Détails du projet</label>
                    <textarea id="message" name="message" required placeholder="Décrivez votre besoin précisément..."></textarea>
                </div>

                <!-- Bloc Captcha Visuel -->
                <div class="h-captcha" data-captcha="true"></div>

                <button type="submit" class="btn-submit">Envoyer ma demande</button>

            </form>
        </div>

    </main>

    <footer style="text-align: center; padding: 40px 20px; margin-top: 60px; border-top: 1px solid #eaeaea; width: 100%; box-sizing: border-box; background-color: #ffffff;">
        <div style="margin-bottom: 1.5rem; line-height: 1.8;">
            <a href="services-menage.html" style="color: #666; text-decoration: none; margin: 0 15px; font-weight: bold;">Ménage</a> | 
            <a href="espaces-verts.html" style="color: #666; text-decoration: none; margin: 0 15px; font-weight: bold;">Jardin</a> | 
            <a href="web-seo.html" style="color: #666; text-decoration: none; margin: 0 15px; font-weight: bold;">Web & SEO</a> | 
            <a href="contact.html" style="color: #666; text-decoration: none; margin: 0 15px; font-weight: bold;">Contact</a> | 
            <a href="blog.html" style="color: #666; text-decoration: none; margin: 0 15px; font-weight: bold;">Blog & Actu</a> | 
            <a href="mentions-legales.html" style="color: #666; text-decoration: none; margin: 0 15px; font-size: 0.9rem;">Mentions Légales</a>
        </div>
        <p style="color: #999; font-size: 0.9rem; margin: 0;">&copy; 2026 Arc-en-Ciel Prestations - Tous droits réservés.</p>
    </footer>

</body>
</html>
